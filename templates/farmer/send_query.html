{% extends 'base.html' %}
{% block content %}

<style>
/* BACKGROUND */
.query-bg{
  background:
    linear-gradient(120deg, rgba(0,0,0,.6), rgba(13,110,253,.55)),
    url("https://images.unsplash.com/photo-1523741543316-beb7fc7023d8?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  border-radius: 25px;
  padding: 40px;
}

/* GLASS CARD */
.glass-card{
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(15px);
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,.25);
  box-shadow: 0 20px 45px rgba(0,0,0,.4);
  color: white;
}

/* TEXTAREA */
textarea{
  border-radius: 14px;
  padding: 14px;
  resize: none;
}
</style>

<div class="query-bg">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4 text-white">
    <h3 class="fw-bold">
      <i class="fas fa-comments"></i> Ask Agriculture Officer
    </h3>
    <span class="badge bg-primary fs-6">
      Expert Support
    </span>
  </div>

  <!-- FORM CARD -->
  <div class="glass-card p-4 col-lg-7">

    <p class="mb-4">
      Submit your agricultural question to an expert officer.
      You will receive a response after verification.
    </p>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">
          <i class="fas fa-question-circle"></i> Your Question
        </label>
        <textarea name="question"
                  rows="5"
                  class="form-control"
                  placeholder="Describe your problem in detail (crop type, symptoms, region, etc.)"
                  required></textarea>
      </div>

      <button class="btn btn-primary btn-lg">
        <i class="fas fa-paper-plane"></i> Send Query
      </button>
    </form>

  </div>

</div>

{% endblock %}
