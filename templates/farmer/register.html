<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROPPILOT | Farmer Registration</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
body{
  min-height:100vh;
  background:
    linear-gradient(120deg, rgba(0,0,0,.65), rgba(25,135,84,.75)),
    url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
}

/* GLASS CARD */
.glass-card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  border-radius:22px;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 20px 45px rgba(0,0,0,.4);
  color:white;
}

/* INPUT */
.form-control{
  border-radius:12px;
  padding:12px;
}

/* BUTTON */
.btn-register{
  border-radius:12px;
  padding:12px;
  font-weight:600;
}

/* TITLE */
.brand{
  font-weight:800;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="row w-100 justify-content-center">

    <div class="col-md-6 col-lg-5">
      <div class="glass-card p-4">

        <h3 class="text-center mb-1 brand">
          🌱 CROPPILOT
        </h3>
        <p class="text-center mb-4">
          Farmer Registration
        </p>

        {% if error %}
          <div class="alert alert-danger text-dark">
            {{ error }}
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-user"></i> Username
            </label>
            <input name="username"
                   class="form-control"
                   placeholder="Choose a username"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-lock"></i> Password
            </label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Create a password"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-phone"></i> Phone Number
            </label>
            <input name="phone"
                   class="form-control"
                   placeholder="Enter phone number"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-map-marker-alt"></i> Region
            </label>
            <input name="region"
                   class="form-control"
                   placeholder="Enter your region"
                   required>
          </div>

          <button class="btn btn-success btn-register w-100 mt-2">
            <i class="fas fa-user-plus"></i> Register
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="/login/" class="text-white text-decoration-none">
            Already registered? Login here
          </a>
        </div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
