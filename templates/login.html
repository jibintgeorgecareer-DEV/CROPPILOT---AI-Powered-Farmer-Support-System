<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROPPILOT | Secure Login</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
/* BACKGROUND */
body{
  min-height:100vh;
  background:
    linear-gradient(120deg, rgba(0,0,0,.65), rgba(25,135,84,.75)),
    url("https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
}

/* GLASS CARD */
.glass-card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.25);
  color:white;
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.85);
  border-radius:12px;
  border:none;
  padding:12px;
}

/* BUTTON */
.btn-login{
  border-radius:12px;
  padding:12px;
  font-weight:600;
}

/* LOGO */
.brand{
  font-weight:800;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="row w-100 justify-content-center">

    <div class="col-md-5 col-lg-4">
      <div class="glass-card p-4 shadow-lg">

        <h3 class="text-center mb-3 brand">
          🌱 CROPPILOT
        </h3>
        <p class="text-center mb-4">
          AI Powered Farmer Support System
        </p>

        {% if error %}
          <div class="alert alert-danger text-dark">
            {{ error }}
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label text-white">
              <i class="fas fa-user"></i> Username
            </label>
            <input name="username"
                   class="form-control"
                   placeholder="Enter your username"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label text-white">
              <i class="fas fa-lock"></i> Password
            </label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter your password"
                   required>
          </div>

          <button class="btn btn-success btn-login w-100 mt-2">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="/farmer/register/" class="text-white text-decoration-none">
            New Farmer? Register here
          </a>
        </div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
