{% extends 'base.html' %}
{% block content %}

<style>
.page-header{
  background: linear-gradient(120deg,#343a40,#198754);
  border-radius: 18px;
  padding: 25px;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.glass-card{
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.25);
  box-shadow: 0 15px 40px rgba(0,0,0,.35);
}

.table thead{
  background:#198754;
  color:white;
}

.table tbody tr:hover{
  background: rgba(25,135,84,.08);
}
</style>

<!-- HEADER -->
<div class="page-header mb-4 d-flex justify-content-between align-items-center">
  <h3 class="fw-bold mb-0">
    <i class="fas fa-chart-line"></i> Market Price Management
  </h3>

  <button class="btn btn-light btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#addPriceModal">
    <i class="fas fa-plus"></i> Add Price
  </button>
</div>

<!-- TABLE -->
<div class="glass-card p-4">
  <div class="table-responsive">
    <table class="table table-bordered align-middle">
      <thead>
        <tr>
          <th>#</th>
          <th>Crop</th>
          <th>Price (₹)</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        {% for p in prices %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ p.crop.name }}</td>
          <td>₹ {{ p.price }}</td>
          <td>{{ p.date }}</td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4" class="text-center text-muted">
            No market price data available
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<!-- ================= ADD PRICE MODAL ================= -->
<div class="modal fade" id="addPriceModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <form method="post">
        {% csrf_token %}

        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">
            <i class="fas fa-rupee-sign"></i> Add Market Price
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <label class="fw-semibold">Crop</label>
          <select name="crop" class="form-select mb-2" required>
            <option value="">-- Select Crop --</option>
            {% for c in crops %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>

          <label class="fw-semibold">Price (₹)</label>
          <input name="price"
                 type="number"
                 class="form-control mb-2"
                 placeholder="Enter price"
                 required>

          <label class="fw-semibold">Date</label>
          <input name="date"
                 type="date"
                 class="form-control mb-2"
                 required>

        </div>

        <div class="modal-footer">
          <button class="btn btn-success">
            Save Price
          </button>
          <button type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal">
            Cancel
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

{% endblock %}
