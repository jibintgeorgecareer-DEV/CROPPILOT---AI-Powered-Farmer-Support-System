{% extends 'base.html' %}
{% block content %}

<style>
/* HEADER */
.page-header{
  background: linear-gradient(120deg,#1d3557,#457b9d);
  border-radius: 18px;
  padding: 25px;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

/* GLASS CARD */
.glass-card{
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.25);
  box-shadow: 0 15px 40px rgba(0,0,0,.35);
}

/* TABLE */
.table thead{
  background: rgba(29,53,87,.95);
  color: white;
}

.table tbody tr{
  transition: .3s ease;
}

.table tbody tr:hover{
  background: rgba(29,53,87,.08);
}

/* ACTION BUTTONS */
.btn-action{
  padding: 4px 10px;
  font-size: 14px;
}
</style>

<!-- HEADER -->
<div class="page-header mb-4 d-flex justify-content-between align-items-center">
  <h3 class="fw-bold mb-0">
    <i class="fas fa-user-tie"></i> Agriculture Officers
  </h3>
  <a href="/adminpanel/add-officer/" class="btn btn-light btn-sm fw-semibold">
    <i class="fas fa-user-plus"></i> Add Officer
  </a>
</div>

<!-- TABLE CARD -->
<div class="glass-card p-4">

  <div class="table-responsive">
    <table class="table table-bordered align-middle">
      <thead>
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Region</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        {% for o in officers %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>
            <i class="fas fa-user text-primary"></i>
            {{ o.user.username }}
          </td>
          <td>{{ o.region }}</td>
          <td>
            <span class="badge bg-success">
              Active
            </span>
          </td>
          <td>
            <a href="/adminpanel/officer/edit/{{ o.id }}/"
               class="btn btn-warning btn-action">
               <i class="fas fa-edit"></i>
            </a>

            <a href="/adminpanel/officer/delete/{{ o.id }}/"
               class="btn btn-danger btn-action"
               onclick="return confirm('Are you sure you want to delete this officer?');">
               <i class="fas fa-trash"></i>
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5" class="text-center text-muted">
            No officers available
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>

{% endblock %}
